apiVersion: v1
kind: ConfigMap
metadata:
  name: samba-config
  namespace: share
data:
  user.map: |
    # Formato: Utente_Locale = Alias_Remoto
    smbshare = *\smbshare smbshare
    multimedia = *\multimedia multimedia
    timemachine = *\timemachine timemachine

  smb.conf: |
    [global]
       workgroup = WORKGROUP
       security = user
       log level = 3
       username map = /etc/samba/user.map
       
       # DISATTIVA il mapping dei nomi ai gruppi di dominio (evita confusione)
       idmap config * : backend = tdb
       idmap config * : range = 3000-7999

       vfs objects = fruit streams_xattr
       fruit:aapl = yes
       fruit:nfs_aces = no

    [Backup]
       path = /mnt/backup
       valid users = timemachine, smbshare
       writable = yes
       force group = timemachine

    [Multimedia]
       path = /mnt/multimedia
       valid users = smbshare, multimedia
       writable = yes
       force group = multimedia

    [Data]
       path = /mnt/data
       valid users = smbshare
       writable = yes