apiVersion: v1
kind: ConfigMap
metadata:
  name: samba-config
  namespace: share
data:
  # La sintassi corretta richiede la virgola per mappare pattern con spazi
  user.map: |
    smbshare = "*\smbshare"
    multimedia = "*\multimedia"
    timemachine = "*\timemachine"

  smb.conf: |
    [global]
       workgroup = WORKGROUP
       interfaces = lo ovs-share
       bind interfaces only = yes
       security = user
       
       # Risolve l'errore "failed to setup guest info"
       # Forza l'utente guest su un account che esiste certamente nel container
       guest account = nobody
       map to guest = bad user
       
       # Mapping utenti per ripulire i domini Windows (MicrosoftAccount, ecc.)
       username map = /etc/samba/user.map
       
       # Disabilita funzioni di dominio non necessarie che causano rumore nei log
       domain master = no
       local master = no
       preferred master = no
       os level = 0

       logging = stdout
       log level = 2
       
       passdb backend = tdbsam
       
       # Estensioni macOS
       vfs objects = fruit streams_xattr
       fruit:aapl = yes
       fruit:model = MacPro7,1
       
       # Forzatura privilegi per filesystem CoreOS/PVC
       force user = root
       force group = root

    [Backup]
       path = /mnt/backup
       valid users = timemachine, smbshare
       writable = yes
       browsable = yes

    [Data]
       path = /mnt/data
       valid users = smbshare
       writable = yes
       browsable = yes

    [Multimedia]
       path = /mnt/multimedia
       valid users = smbshare, multimedia
       writable = yes
       browsable = yes