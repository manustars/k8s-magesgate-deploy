apiVersion: v1
kind: ConfigMap
metadata:
  name: samba-config
  namespace: share
data:
  smb.conf: |
    [global]
       workgroup = WORKGROUP
       security = user
       log level = 3
       server min protocol = SMB2
       # --- IGNORA DOMINIO E FORZA LOGIN LOCALE ---
       # Forza l'autenticazione solo sul database SAM locale (ignora domini esterni)
       auth methods = sam
       # Se il client manda DOMINIO\utente, Samba prova a cercare solo 'utente'
       winbind offline logon = yes
       # Impedisce a Samba di aggiungere il prefisso del dominio agli utenti
       winbind nested groups = no
       
       # Interfacce
       interfaces = lo ovs-share
       bind interfaces only = yes

       # macOS / Time Machine
       vfs objects = catia fruit streams_xattr
       ea support = yes
       fruit:aapl = yes
       fruit:model = MacPro7,1
       fruit:nfs_aces = no

    [Backup]
       path = /mnt/backup
       valid users = timemachine, smbshare
       writable = yes
       force group = timemachine
       create mask = 0660
       directory mask = 0770
       fruit:time machine = yes
       fruit:time machine max size = 2T

    [Data]
       path = /mnt/data
       valid users = smbshare
       writable = yes
       create mask = 0600
       directory mask = 0700

    [Multimedia]
       path = /mnt/multimedia
       valid users = smbshare, multimedia
       writable = yes
       force group = multimedia
       create mask = 0660
       directory mask = 0770