apiVersion: v1
kind: ConfigMap
metadata:
  name: samba-config
  namespace: share
data:
  # Nuovo file di mapping
  user.map: |
    smbshare = * \smbshare
    multimedia = * \multimedia
    timemachine = * \timemachine

  smb.conf: |
    [global]
       workgroup = WORKGROUP
       interfaces = lo ovs-share
       bind interfaces only = yes
       security = user
       
       # Documentazione Samba: Mappa gli utenti remoti su quelli locali
       username map = /etc/samba/user.map
       
       # Importante: disabilita i tentativi di Kerberos/Domain che Windows prova ad usare
       domain master = no
       local master = yes
       preferred master = no

       logging = stdout
       log level = 2
       
       passdb backend = tdbsam
       
       # Permessi e macOS (le tue configurazioni)
       vfs objects = fruit streams_xattr
       fruit:aapl = yes
       fruit:model = MacPro7,1
       force user = root
       force group = root

    [Backup]
       path = /mnt/backup
       valid users = timemachine, smbshare
       writable = yes
    [Data]
       path = /mnt/data
       valid users = smbshare
       writable = yes
    [Multimedia]
       path = /mnt/multimedia
       valid users = smbshare, multimedia
       writable = yes