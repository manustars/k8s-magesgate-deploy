apiVersion: v1
kind: ConfigMap
metadata:
  name: avahi-config
  namespace: share
data:
  avahi-daemon.conf: |
    [server]
    # Nome che apparirà sul Finder (puoi cambiarlo a piacimento)
    host-name=share
    domain-name=hq.marsellihome.com
    # Fondamentale: forza Avahi a usare solo il bridge della seconda rete
    allow-interfaces=ovs-share
    use-ipv4=yes
    use-ipv6=no
    enable-dbus=no
    ratelimit-interval-usec=1000000
    ratelimit-burst=1000

    [wide-area]
    enable-wide-area=yes

    [publish]
    publish-hinfo=no
    publish-workstation=no

    [reflector]
    enable-reflector=no

    [rlimits]
    rlimit-core=0
    rlimit-data=4194304
    rlimit-fsize=0
    rlimit-nofile=768
    rlimit-stack=4194304
    rlimit-nproc=3
  timemachine.service: |
    <?xml version="1.0" standalone='no'?>
    <!DOCTYPE service-group SYSTEM "avahi-service.dtd">
    <service-group>
      <name>NAS-Server</name>

      <service>
        <type>_smb._tcp</type>
        <port>445</port>
      </service>

      <service>
        <type>_adisk._tcp</type>
        <port>9</port>
        <txt-record>dk0=adVN=Backup,adVF=0x82</txt-record>
      </service>

    </service-group>