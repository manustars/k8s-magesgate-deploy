apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: samba-share
  namespace: share
spec:
  selector:
    matchLabels:
      app: samba-share
  template:
    metadata:
      labels:
        app: samba-share
    spec:
      hostNetwork: true
      dnsPolicy: None
      dnsConfig:
        nameservers: ["10.0.1.254"]
        searches: ["hq.marsellihome.com"]
      
      nodeSelector:
        kubernetes.io/hostname: "kube-bootstrap-cvbiv.hq.marsellihome.com"

      initContainers:
      - name: user-setup
        image: quay.io/samba.org/samba-server:latest
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e
            # 1. Prepariamo le directory per il database Samba
            mkdir -p /var/lib/samba/private
            chmod 700 /var/lib/samba/private
            
            # 2. Prepariamo il file passwd per il container finale
            cat /etc/passwd > /mnt/shared/passwd-custom
            
            # 3. Ciclo creazione utenti
            uid=2000
            for user_file in /etc/samba-secrets/*; do
              [[ "$user_file" == *".."* ]] && continue
              
              username=$(basename "$user_file")
              password=$(cat "$user_file")
              
              echo "Processando utente: $username"
              
              # Creiamo l'utente nel sistema locale dell'InitContainer
              # Fondamentale: permette a smbpasswd di validare l'utente
              useradd -M -s /usr/sbin/nologin -u $uid "$username" || true
              
              # Aggiungiamo l'utente al file che verrà montato nel container principale
              echo "${username}:x:${uid}:${uid}:Samba User:/tmp:/usr/sbin/nologin" >> /mnt/shared/passwd-custom
              
              # Registriamo la password nel database persistente (tdbsam)
              (echo "$password"; echo "$password") | smbpasswd -a -s "$username"
              
              ((uid++))
            done
            echo "Setup completato correttamente."
        volumeMounts:
        - name: samba-secrets
          mountPath: /etc/samba-secrets
        - name: samba-private
          mountPath: /var/lib/samba/private
        - name: passwd-volume
          mountPath: /mnt/shared

      containers:
      # --- SAMBA SERVER ---
      - name: samba
        image: quay.io/samba.org/samba-server:latest
        volumeMounts:
        - name: config
          mountPath: /etc/samba/smb.conf
          subPath: smb.conf
        - name: samba-private
          mountPath: /var/lib/samba/private
        - name: passwd-volume
          mountPath: /etc/passwd
          subPath: passwd-custom
        - name: multimedia-pvc
          mountPath: /mnt/backup
          subPath: backup
        - name: multimedia-pvc
          mountPath: /mnt/data
          subPath: data
        - name: multimedia-pvc
          mountPath: /mnt/multimedia
          subPath: Video

      # --- AVAHI DISCOVERY (mDNS) ---
      - name: avahi
        image: docker.io/ydkn/avahi:latest
        securityContext:
          privileged: true
        env:
        - name: AVAHI_SERVICES
          value: |
            [NAS-Server]
            type=_smb._tcp
            port=445
            [Time-Machine-Backup]
            type=_adisk._tcp
            port=0
            txt=sys=waMa=0,adVF=0x100 dk0=adVN=Backup,adVF=0x82
        volumeMounts:
        - name: avahi-conf
          mountPath: /etc/avahi/avahi-daemon.conf
          subPath: avahi-daemon.conf

      volumes:
      - name: config
        configMap:
          name: samba-config
      - name: avahi-conf
        configMap:
          name: avahi-config
          items:
            - key: avahi-daemon.conf
              path: avahi-daemon.conf
      - name: samba-secrets
        secret:
          secretName: samba-users
      - name: samba-private
        emptyDir: {}
      - name: passwd-volume
        emptyDir: {}
      - name: multimedia-pvc
        persistentVolumeClaim:
          claimName: pvc-local-multimedia