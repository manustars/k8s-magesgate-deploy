apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: samba-share
  namespace: share
spec:
  selector:
    matchLabels:
      app: samba-share
  template:
    metadata:
      labels:
        app: samba-share
    spec:
      hostNetwork: true
      dnsPolicy: None
      dnsConfig:
        nameservers: ["10.0.1.254"]
        searches: ["hq.marsellihome.com"]
      
      nodeSelector:
        kubernetes.io/hostname: "kube-bootstrap-cvbiv.hq.marsellihome.com"

      containers:
      - name: samba
        image: quay.io/samba.org/samba-server:latest
        command: ["/bin/bash", "-c"]
        args:
          - |
            # 1. Creazione utenti con UID fissi
            # Creiamo multimedia (1000) e timemachine (1002)
            useradd -u 1000 -M -s /usr/sbin/nologin multimedia || echo "multimedia già presente"
            useradd -u 1002 -M -s /usr/sbin/nologin timemachine || echo "timemachine già presente"
            
            # Creiamo smbshare (1001) e lo aggiungiamo ai gruppi degli altri
            useradd -u 1001 -M -G multimedia,timemachine -s /usr/sbin/nologin smbshare || usermod -aG multimedia,timemachine smbshare

            # 2. Configurazione password Samba dai secret
            for user_file in /etc/samba-secrets/*; do
              [[ "$user_file" == *".."* ]] && continue
              username=$(basename "$user_file")
              password=$(cat "$user_file")
              echo -e "$password\n$password" | smbpasswd -a -s "$username"
              smbpasswd -e "$username"
            done

            # 3. SETTAGGIO PERMESSI FISICI (SGID)
            echo "Applicazione permessi alle cartelle..."
            
            # Multimedia: Proprietario multimedia, bit SGID per ereditarietà gruppo
            chown -R multimedia:multimedia /mnt/multimedia
            chmod -R 2770 /mnt/multimedia

            # Backup: Proprietario timemachine, bit SGID
            chown -R timemachine:timemachine /mnt/backup
            chmod -R 2770 /mnt/backup

            # Data: Solo smbshare
            chown -R smbshare:smbshare /mnt/data
            chmod -R 700 /mnt/data

            echo "Avvio Samba..."
            exec /usr/sbin/smbd --foreground --no-process-group --debug-stdout

        volumeMounts:
        - name: samba-secrets
          mountPath: /etc/samba-secrets
        - name: config
          mountPath: /etc/samba/smb.conf
          subPath: smb.conf
        - name: config
          mountPath: /etc/samba/user.map
          subPath: user.map
        - name: samba-private
          mountPath: /var/lib/samba/private
        - name: multimedia-pvc
          mountPath: /mnt/backup
          subPath: backup
        - name: multimedia-pvc
          mountPath: /mnt/data
          subPath: data
        - name: multimedia-pvc
          mountPath: /mnt/multimedia
          subPath: Video

      - name: avahi
        image: docker.io/ydkn/avahi:latest
        securityContext:
          privileged: true
        env:
        - name: AVAHI_SERVICES
          value: |
            [NAS-Server]
            type=_smb._tcp
            port=445
            [Time-Machine-Backup]
            type=_adisk._tcp
            port=0
            txt=sys=waMa=0,adVF=0x100 dk0=adVN=Backup,adVF=0x82
        volumeMounts:
        - name: avahi-conf
          mountPath: /etc/avahi/avahi-daemon.conf
          subPath: avahi-daemon.conf

      volumes:
      - name: config
        configMap:
          name: samba-config
      - name: avahi-conf
        configMap:
          name: avahi-config
          items:
            - key: avahi-daemon.conf
              path: avahi-daemon.conf
      - name: samba-secrets
        secret:
          secretName: samba-users
      - name: samba-private
        emptyDir: {}
      - name: multimedia-pvc
        persistentVolumeClaim:
          claimName: pvc-local-multimedia